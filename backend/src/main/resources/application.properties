spring.application.name=backend
#Tomcat server port number 8080
#server.port=8081
#context path default value : empty
#server.servlet.context-path=/ems
#server.servlet.session.persistent=false
#DB properties
spring.datasource.url=jdbc:mysql://localhost:3306/Healthmate
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD
# JPA properties
spring.jpa.show-sql = true
spring.jpa.hibernate.ddl-auto = update
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
#logging.level.org.springframework.orm.hibernate5=DEBUG
#spring.devtools.restart.enabled=false
server.port=8080

#Disable open session in view 
spring.jpa.open-in-view=false
#Spring security custom props for JWT
#JWT Secret key for signing n Verification 
SECRET_KEY=YOUR_JWT_SECRET_KEY
#JWT expiration timeout in msec for a day : 24*3600*1000
EXP_TIMEOUT=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=healthmate.hospital@gmail.com
spring.mail.password =YOUR_MAIL_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend Url
#frontend.url=${FRONTEND_URL}

# Twilio configuration
twilio.accountSid= YOUR_TWILIO_ACCOUNT_SID
twilio.authToken= YOUR_TWILIO_AUTH_TOKEN
twilio.fromNumber=YOUR_TWILIO_FROM_NUMBER


